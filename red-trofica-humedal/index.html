<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulador realista de red trófica</title>
<style>
:root{--bg1:#e4f4ec;--bg2:#f8fbf6;--ink:#15352c;--muted:#60756d;--card:#fff;--accent:#16745d;--accent2:#e0a638;--danger:#c8423b;--warn:#d88825;--soft:#e7f5ee;--line:#6fa891}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--bg1),var(--bg2))}
header{padding:24px;background:linear-gradient(135deg,rgba(7,51,42,.96),rgba(20,92,73,.96));color:white}
header h1{margin:0 0 8px;font-size:clamp(25px,3vw,38px)}
header p{margin:0;max-width:1100px;color:#d7eee6;line-height:1.55}
.layout{display:grid;grid-template-columns:350px 1fr;gap:18px;padding:18px}
.panel,.ecosystem,.guide,.model-note{background:rgba(255,255,255,.96);border:1px solid #d7e8e0;border-radius:24px;box-shadow:0 12px 34px rgba(27,75,59,.12)}
.panel{padding:18px;position:sticky;top:14px;height:max-content}
h2{margin:0 0 12px;font-size:21px}
label{display:flex;justify-content:space-between;gap:8px;font-weight:bold;margin:14px 0 7px}
label span.value{font-weight:normal;color:var(--accent)}
select,input[type="range"],button{width:100%}
select{padding:10px;border-radius:14px;border:1px solid #bed9ce;color:var(--ink);background:white}
input[type="range"]{accent-color:var(--accent)}
.hint{color:var(--muted);font-size:12.5px;line-height:1.35;margin-top:4px}
.button-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
button{border:0;border-radius:15px;padding:11px 12px;background:var(--accent);color:white;font-weight:800;cursor:pointer;transition:.18s ease}
button:hover{transform:translateY(-1px);filter:brightness(1.05)}
button.secondary{background:#e9f5ef;color:var(--accent)}
button.warning{background:var(--accent2);color:#47330e;margin-top:8px}
.lang{margin:6px 0 12px;background:#f1faf6;color:var(--accent);border:1px solid #cfe8dc}
.ecosystem{padding:18px}
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.metric{min-height:78px;border-radius:18px;padding:10px;background:var(--soft);text-align:center;display:grid;place-items:center;border:1px solid #d3e7de}
.metric strong{display:block;font-size:23px;color:var(--accent);line-height:1}
.metric span{display:block;font-size:12px;color:var(--muted);margin-top:5px}
.metric.danger strong{color:var(--danger)}
.metric.warn strong{color:var(--warn)}
.stage{position:relative;min-height:520px;border-radius:24px;overflow:hidden;border:1px solid #c9e1d8;background:radial-gradient(circle at 18% 88%,rgba(37,134,88,.28),transparent 28%),radial-gradient(circle at 85% 22%,rgba(224,166,56,.25),transparent 23%),linear-gradient(180deg,rgba(203,234,236,.95) 0%,rgba(207,236,229,.95) 44%,rgba(172,215,185,.95) 100%)}
.stage::before{content:"";position:absolute;inset:auto -8% -10% -8%;height:38%;background:radial-gradient(ellipse at 20% 40%,rgba(60,120,65,.45),transparent 40%),radial-gradient(ellipse at 70% 30%,rgba(47,108,82,.38),transparent 35%),linear-gradient(180deg,rgba(77,139,91,.2),rgba(43,103,71,.42));pointer-events:none}
.stage.dark{filter:saturate(.75) brightness(.82)}
.stage.toxic{box-shadow:inset 0 0 0 999px rgba(112,88,55,.22)}
.stage.collapse{box-shadow:inset 0 0 0 999px rgba(100,35,35,.20)}
svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.species{position:absolute;width:158px;border-radius:20px;padding:10px;background:rgba(255,255,255,.93);border:2px solid #cae2d7;box-shadow:0 9px 18px rgba(21,67,52,.13);text-align:center;transition:.3s ease;z-index:3}
.species .emoji{font-size:34px;display:block;line-height:1.05}
.species h3{font-size:14px;margin:4px 0 6px}
.species .role{font-size:11px;color:var(--muted);margin-bottom:6px}
.bar{height:10px;border-radius:99px;overflow:hidden;background:#e5eeea}
.fill{height:100%;width:50%;border-radius:99px;background:var(--accent);transition:width .3s ease,background .3s ease}
.pop{margin-top:5px;font-size:12px;color:var(--muted)}
.species.low{border-color:var(--warn);background:#fff8ec}.species.dead{opacity:.45;filter:grayscale(1);border-color:var(--danger);background:#fff0ef}.species.boost{border-color:var(--accent);transform:translateY(-2px)}.species.low .fill{background:var(--warn)}.species.dead .fill{background:var(--danger)}
.producer{left:7%;top:65%}.grazer{left:25%;top:49%}.fish{left:46%;top:65%}.bird{left:61%;top:37%}.apex{left:78%;top:16%}.decomposer{left:36%;top:12%}
.log{margin-top:14px;display:grid;grid-template-columns:1.15fr .85fr;gap:12px}.log-box,.mini-box{background:#f7fbf8;border:1px solid #dbece5;border-radius:18px;padding:13px;min-height:104px;line-height:1.45;color:var(--muted)}
.log-box strong,.mini-box strong{color:var(--ink)}.bars{display:grid;gap:8px;margin-top:10px}.abiotic-row{display:grid;grid-template-columns:95px 1fr 40px;gap:8px;align-items:center;font-size:12px}.abiotic-row .track{height:9px;background:#e3eee9;border-radius:99px;overflow:hidden}.abiotic-row .track div{height:100%;background:var(--accent);border-radius:99px}
.guide{margin:0 18px 18px;padding:18px}.question-grid,.model-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.qcard,.model-note{background:#f8fbf9;border:1px solid #dcebe5;border-radius:18px;padding:14px;line-height:1.4}.qcard strong,.model-note strong{color:var(--accent)}.model-grid{margin-top:12px}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.panel{position:relative;top:0}.metrics{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.metrics,.question-grid,.model-grid,.log{grid-template-columns:1fr}.stage{min-height:760px}.species{width:142px}.producer{left:7%;top:78%}.grazer{left:8%;top:55%}.fish{left:52%;top:73%}.bird{left:52%;top:47%}.apex{left:51%;top:19%}.decomposer{left:8%;top:18%}}
</style>
</head>
<body>
<header>
<h1 id="title"></h1>
<p id="subtitle"></p>
</header>

<main class="layout">
<aside class="panel">
<h2 id="panelTitle"></h2>
<button id="langBtn" class="lang">English</button>

<label><span id="sunLabel"></span><span class="value" id="sunValue">78%</span></label>
<input id="sun" type="range" min="0" max="100" value="78"/>
<div class="hint" id="sunHint"></div>

<label><span id="waterLabel"></span><span class="value" id="waterValue">78%</span></label>
<input id="water" type="range" min="0" max="100" value="78"/>
<div class="hint" id="waterHint"></div>

<label><span id="pollutionLabel"></span><span class="value" id="pollutionValue">8%</span></label>
<input id="pollution" type="range" min="0" max="100" value="8"/>
<div class="hint" id="pollutionHint"></div>

<label><span id="nutrientLabel"></span><span class="value" id="nutrientValue">55%</span></label>
<input id="nutrients" type="range" min="0" max="100" value="55"/>
<div class="hint" id="nutrientHint"></div>

<label id="removeLabel"></label>
<select id="removeSpecies">
<option value="none" id="removeNone"></option>
<option value="grazer" id="removeGrazer"></option>
<option value="fish" id="removeFish"></option>
<option value="bird" id="removeBird"></option>
<option value="apex" id="removeApex"></option>
</select>

<label id="invasiveLabel"></label>
<select id="invasive">
<option value="none" id="invasiveNone"></option>
<option value="floatingPlant" id="invasivePlant"></option>
<option value="predatoryFish" id="invasiveFish"></option>
</select>

<div class="button-row">
<button id="playBtn"></button>
<button class="secondary" id="resetBtn"></button>
</div>
<button class="warning" id="eventBtn"></button>
</aside>

<section class="ecosystem">
<h2 id="ecosystemTitle"></h2>
<div class="metrics">
<div class="metric" id="mBio"><strong id="biodiversity">98</strong><span id="bioLabel"></span></div>
<div class="metric" id="mStability"><strong id="stability">96</strong><span id="stabilityLabel"></span></div>
<div class="metric" id="mEnergy"><strong id="energy">60</strong><span id="energyLabel"></span></div>
<div class="metric" id="mOxygen"><strong id="oxygenMetric">76</strong><span id="oxygenLabel"></span></div>
<div class="metric" id="mDetritus"><strong id="detritusMetric">18</strong><span id="detritusLabel"></span></div>
<div class="metric" id="mRisk"><strong id="risk">Bajo</strong><span id="riskLabel"></span></div>
</div>

<div class="stage" id="stage">
<svg viewBox="0 0 1000 560" preserveAspectRatio="none">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#6fa891"/></marker></defs>
<line x1="170" y1="390" x2="330" y2="315" stroke="#6fa891" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="405" y1="315" x2="540" y2="390" stroke="#6fa891" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="610" y1="385" x2="700" y2="255" stroke="#6fa891" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="760" y1="245" x2="850" y2="155" stroke="#6fa891" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="835" y1="150" x2="475" y2="115" stroke="#6fa891" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<line x1="465" y1="160" x2="180" y2="390" stroke="#6fa891" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
<line x1="615" y1="390" x2="460" y2="140" stroke="#6fa891" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
</svg>
<div class="species producer" data-id="producer"><span class="emoji">🌿</span><h3 id="producerName"></h3><div class="role" id="producerRole"></div><div class="bar"><div class="fill"></div></div><div class="pop"></div></div>
<div class="species grazer" data-id="grazer"><span class="emoji">🐌</span><h3 id="grazerName"></h3><div class="role" id="grazerRole"></div><div class="bar"><div class="fill"></div></div><div class="pop"></div></div>
<div class="species fish" data-id="fish"><span class="emoji">🐟</span><h3 id="fishName"></h3><div class="role" id="fishRole"></div><div class="bar"><div class="fill"></div></div><div class="pop"></div></div>
<div class="species bird" data-id="bird"><span class="emoji">🪶</span><h3 id="birdName"></h3><div class="role" id="birdRole"></div><div class="bar"><div class="fill"></div></div><div class="pop"></div></div>
<div class="species apex" data-id="apex"><span class="emoji">🐊</span><h3 id="apexName"></h3><div class="role" id="apexRole"></div><div class="bar"><div class="fill"></div></div><div class="pop"></div></div>
<div class="species decomposer" data-id="decomposer"><span class="emoji">🍄</span><h3 id="decomposerName"></h3><div class="role" id="decomposerRole"></div><div class="bar"><div class="fill"></div></div><div class="pop"></div></div>
</div>

<div class="log">
<div class="log-box" id="logBox"></div>
<div class="mini-box">
<strong id="internalTitle"></strong>
<div class="bars">
<div class="abiotic-row"><span id="toxinLabel"></span><div class="track"><div id="toxinBar"></div></div><span id="toxinValue">0</span></div>
<div class="abiotic-row"><span id="turbidityLabel"></span><div class="track"><div id="turbidityBar"></div></div><span id="turbidityValue">0</span></div>
<div class="abiotic-row"><span id="recyclingLabel"></span><div class="track"><div id="recyclingBar"></div></div><span id="recyclingValue">0</span></div>
</div>
</div>
</div>
</section>
</main>

<section class="guide">
<h2 id="questionsTitle"></h2>
<div class="question-grid">
<div class="qcard"><strong id="q1Title"></strong><br><span id="q1Text"></span></div>
<div class="qcard"><strong id="q2Title"></strong><br><span id="q2Text"></span></div>
<div class="qcard"><strong id="q3Title"></strong><br><span id="q3Text"></span></div>
<div class="qcard"><strong id="q4Title"></strong><br><span id="q4Text"></span></div>
<div class="qcard"><strong id="q5Title"></strong><br><span id="q5Text"></span></div>
<div class="qcard"><strong id="q6Title"></strong><br><span id="q6Text"></span></div>
</div>
<div class="model-grid">
<div class="model-note"><strong id="m1Title"></strong><br><span id="m1Text"></span></div>
<div class="model-note"><strong id="m2Title"></strong><br><span id="m2Text"></span></div>
<div class="model-note"><strong id="m3Title"></strong><br><span id="m3Text"></span></div>
</div>
</section>

function T(k){return I18N[currentLang][k]||k}
function sliders(){return {sun:+$('sun').value,water:+$('water').value,pollution:+$('pollution').value,nutrients:+$('nutrients').value,removed:$('removeSpecies').value,invasive:$('invasive').value}}
function isControlScenario(){const s=sliders();return s.sun===78&&s.water===78&&s.pollution===8&&s.nutrients===55&&s.removed==='none'&&s.invasive==='none'}
function setLog(m){$('logBox').innerHTML=m}
function applyLanguage(){
document.documentElement.lang=currentLang;
['title','subtitle','panelTitle','sunLabel','sunHint','waterLabel','waterHint','pollutionLabel','pollutionHint','nutrientLabel','nutrientHint','removeLabel','invasiveLabel','ecosystemTitle','bioLabel','stabilityLabel','energyLabel','oxygenLabel','detritusLabel','riskLabel','internalTitle','toxinLabel','turbidityLabel','recyclingLabel','producerName','producerRole','grazerName','grazerRole','fishName','fishRole','birdName','birdRole','apexName','apexRole','decomposerName','decomposerRole','removeNone','removeGrazer','removeFish','removeBird','removeApex','invasiveNone','invasivePlant','invasiveFish','questionsTitle','q1Title','q1Text','q2Title','q2Text','q3Title','q3Text','q4Title','q4Text','q5Title','q5Text','q6Title','q6Text','m1Title','m1Text','m2Title','m2Text','m3Title','m3Text'].forEach(id=>{if($(id))$(id).textContent=T(id)});
$('langBtn').textContent=T('langBtn');$('playBtn').textContent=running?T('pause'):T('play');$('resetBtn').textContent=T('reset');$('eventBtn').textContent=T('event');chooseLog();render();
}
function applyControl(){running=false;clearInterval(timer);tickCount=0;$('sun').value=78;$('water').value=78;$('pollution').value=8;$('nutrients').value=55;$('removeSpecies').value='none';$('invasive').value='none';state={...CONTROL.state};abiotic={...CONTROL.abiotic};$('playBtn').textContent=T('play');setLog(T('logControlApplied'));render()}
function calculateTargets(){
const s=sliders();if(isControlScenario())return {state:{...CONTROL.state},abiotic:{...CONTROL.abiotic},eutrophy:0,quality:1};
const severeNoLight=s.sun<=2,severeNoWater=s.water<=2;
const lightQ=Math.pow(clamp(s.sun/78,0,1.35),.85),waterQ=Math.pow(clamp(s.water/78,0,1.25),.95),pollutionQ=clamp(1-s.pollution/100,0,1),nutrientQ=s.nutrients<=55?clamp(s.nutrients/55,0,1):1+Math.min((s.nutrients-55)*.012,.45);
let producerTarget=70*lightQ*waterQ*nutrientQ*Math.pow(pollutionQ,.72);if(s.nutrients>70&&s.sun>40&&s.water>40)producerTarget+=(s.nutrients-70)*.9;if(s.invasive==='floatingPlant')producerTarget+=18;if(severeNoLight||severeNoWater)producerTarget=0;producerTarget=clamp(producerTarget,0,96);
const eutrophy=clamp(Math.max(0,producerTarget-70)/30+Math.max(0,s.nutrients-70)/55+(s.invasive==='floatingPlant'?.35:0),0,1);
const toxin=clamp(s.pollution*.9+(s.invasive==='predatoryFish'?8:0)),turbidity=clamp(s.pollution*.42+Math.max(0,s.nutrients-55)*.7+Math.max(0,producerTarget-70)*.9+(s.invasive==='floatingPlant'?22:0)+abiotic.detritus*.08);
const oxygen=clamp(76+Math.min(producerTarget,70)*.10+s.water*.11-s.pollution*.38-abiotic.detritus*.11-eutrophy*42-(severeNoWater?55:0));
const oxygenQ=clamp(oxygen/76,0,1.1),quality=clamp(waterQ*pollutionQ*oxygenQ*(1-eutrophy*.72),0,1.12);
const foodBase=producerTarget<=70?producerTarget:Math.max(15,70-(producerTarget-70)*.45);
let grazerTarget=clamp(foodBase*.72*quality,0,85),fishTarget=clamp(grazerTarget*.72*quality,0,70),birdTarget=clamp(fishTarget*.62*quality+2,0,50),apexTarget=clamp((birdTarget*.42+fishTarget*.10)*quality+2,0,34),decomposerTarget=clamp(45+eutrophy*34+Math.max(0,abiotic.detritus-18)*.6-(producerTarget<12&&abiotic.detritus<16?30:0)-(severeNoWater?35:0));
if(s.invasive==='predatoryFish'){fishTarget*=.55;grazerTarget*=.82;birdTarget*=.75;apexTarget+=3}
if(s.removed==='grazer'){grazerTarget=0;producerTarget=clamp(producerTarget+22,0,96);fishTarget*=.22;birdTarget*=.38;apexTarget*=.45;decomposerTarget=clamp(decomposerTarget+8)}
if(s.removed==='fish'){fishTarget=0;grazerTarget=clamp(grazerTarget+28,0,96);producerTarget=clamp(producerTarget-grazerTarget*.10,0,96);birdTarget*=.25;apexTarget*=.40}
if(s.removed==='bird'){birdTarget=0;fishTarget=clamp(fishTarget+20,0,86);grazerTarget=clamp(grazerTarget-fishTarget*.07,0,96);producerTarget=clamp(producerTarget+5,0,96);apexTarget*=.48}
if(s.removed==='apex'){apexTarget=0;birdTarget=clamp(birdTarget+18,0,72);fishTarget=clamp(fishTarget-birdTarget*.16,0,86);grazerTarget=clamp(grazerTarget+Math.max(0,42-fishTarget)*.30,0,96);producerTarget=clamp(producerTarget-grazerTarget*.075,0,96)}
return {state:{producer:producerTarget,grazer:grazerTarget,fish:fishTarget,bird:birdTarget,apex:apexTarget,decomposer:decomposerTarget},abiotic:{oxygen,toxin,turbidity,recycling:clamp(decomposerTarget*1.25-toxin*.18),detritus:abiotic.detritus},eutrophy,quality};
}
function modelStep(){
const s=sliders(),prev={...state},result=calculateTargets(),target=result.state;
if(isControlScenario()){state={...CONTROL.state};abiotic={...CONTROL.abiotic};setLog(T('logControl'));render();return}
state.producer+=(target.producer-state.producer)*.18;state.grazer+=(target.grazer-state.grazer)*.10;state.fish+=(target.fish-state.fish)*.075;state.bird+=(target.bird-state.bird)*.055;state.apex+=(target.apex-state.apex)*.04;state.decomposer+=(target.decomposer-state.decomposer)*.12;
const mortality=Object.keys(prev).reduce((sum,k)=>sum+Math.max(0,prev[k]-state[k]),0);
abiotic.detritus=clamp(abiotic.detritus+mortality*.16+Math.max(0,state.producer-70)*.18+s.pollution*.018-state.decomposer*.035-(state.producer<10?1.1:0));
abiotic.oxygen+=(result.abiotic.oxygen-abiotic.oxygen)*.22;abiotic.toxin+=(result.abiotic.toxin-abiotic.toxin)*.25;abiotic.turbidity+=(result.abiotic.turbidity-abiotic.turbidity)*.25;abiotic.recycling+=(result.abiotic.recycling-abiotic.recycling)*.18;
Object.keys(state).forEach(k=>state[k]=clamp(state[k]));chooseLog(result);render();
}
function chooseLog(result=calculateTargets()){
const s=sliders();if(isControlScenario())return setLog(T('logControl'));if(s.water<=2)return setLog(T('logWater'));if(s.sun<=2)return setLog(T('logLight'));if(s.pollution>70)return setLog(T('logPollution'));if(result.eutrophy>.18||state.producer>70)return setLog(T('logEutrophy'));
const removal={grazer:T('logGrazer'),fish:T('logFish'),bird:T('logBird'),apex:T('logApex')};if(removal[s.removed])return setLog(removal[s.removed]);if(s.invasive==='floatingPlant')return setLog(T('logInvasivePlant'));if(s.invasive==='predatoryFish')return setLog(T('logInvasiveFish'));setLog(T('logActive'));
}
function render(){
const s=sliders();$('sunValue').textContent=`${s.sun}%`;$('waterValue').textContent=`${s.water}%`;$('pollutionValue').textContent=`${s.pollution}%`;$('nutrientValue').textContent=`${s.nutrients}%`;
const labels={producer:T('biomass'),grazer:T('population'),fish:T('population'),bird:T('population'),apex:T('population'),decomposer:T('activity')};
Object.keys(state).forEach(id=>{const card=document.querySelector(`[data-id="${id}"]`),value=rounded(state[id]);card.querySelector('.fill').style.width=`${value}%`;card.querySelector('.pop').textContent=`${labels[id]}: ${value}`;card.classList.toggle('dead',value<5);card.classList.toggle('low',value>=5&&value<28);card.classList.toggle('boost',value>78)});
const values=Object.values(state),living=values.filter(v=>v>=5).length,avg=values.reduce((a,b)=>a+b,0)/values.length,imbalance=Math.max(...values)-Math.min(...values);
const energy=clamp(state.producer*.42+state.grazer*.25+state.fish*.17+state.bird*.09+state.apex*.07-abiotic.toxin*.15),stability=isControlScenario()?96:clamp(avg-imbalance*.16+abiotic.oxygen*.25-abiotic.toxin*.20-Math.max(0,state.producer-70)*.35),biotic=isControlScenario()?98:clamp((living/6)*100+avg*.20-abiotic.toxin*.16),riskScore=clamp(100-stability+abiotic.toxin*.28+(100-abiotic.oxygen)*.30+Math.max(0,state.producer-70)*.45+(6-living)*8);
$('biodiversity').textContent=rounded(biotic);$('stability').textContent=rounded(stability);$('energy').textContent=rounded(energy);$('oxygenMetric').textContent=rounded(abiotic.oxygen);$('detritusMetric').textContent=rounded(abiotic.detritus);$('risk').textContent=riskScore>82?T('critical'):riskScore>62?T('high'):riskScore>38?T('medium'):T('low');
setMetricClass('mOxygen',abiotic.oxygen<30,abiotic.oxygen<50);setMetricClass('mRisk',riskScore>62,riskScore>38);setMetricClass('mStability',stability<35,stability<55);setMetricClass('mEnergy',energy<35,energy<55);setMetricClass('mDetritus',abiotic.detritus>70,abiotic.detritus>45);setMetricClass('mBio',biotic<35,biotic<55);
$('toxinValue').textContent=rounded(abiotic.toxin);$('turbidityValue').textContent=rounded(abiotic.turbidity);$('recyclingValue').textContent=rounded(abiotic.recycling);$('toxinBar').style.width=`${rounded(abiotic.toxin)}%`;$('turbidityBar').style.width=`${rounded(abiotic.turbidity)}%`;$('recyclingBar').style.width=`${rounded(abiotic.recycling)}%`;
const stage=$('stage');stage.classList.toggle('dark',s.sun<20||abiotic.turbidity>70);stage.classList.toggle('toxic',s.pollution>55||abiotic.toxin>55);stage.classList.toggle('collapse',riskScore>82);
}
function setMetricClass(id,danger,warn){const el=$(id);el.classList.toggle('danger',danger);el.classList.toggle('warn',!danger&&warn)}
function playPause(){running=!running;$('playBtn').textContent=running?T('pause'):T('play');if(running){setLog(isControlScenario()?T('logControl'):T('logActive'));timer=setInterval(()=>{tickCount++;modelStep()},950)}else{clearInterval(timer);setLog(T('logPaused'))}}
function applyDisturbance(){const events=['drought','runoff','restoration'],e=events[Math.floor(Math.random()*events.length)];if(e==='drought'){$('water').value=Math.max(0,+$('water').value-32);abiotic.oxygen=clamp(abiotic.oxygen-15);setLog(T('logDrought'))}if(e==='runoff'){$('pollution').value=Math.min(100,+$('pollution').value+24);$('nutrients').value=Math.min(100,+$('nutrients').value+25);abiotic.detritus=clamp(abiotic.detritus+12);setLog(T('logRunoff'))}if(e==='restoration'){$('water').value=Math.min(100,+$('water').value+18);$('pollution').value=Math.max(0,+$('pollution').value-20);abiotic.detritus=clamp(abiotic.detritus-10);setLog(T('logRestoration'))}render()}
function previewChange(){chooseLog();render()}
['sun','water','pollution','nutrients','removeSpecies','invasive'].forEach(id=>{$(id).addEventListener('input',previewChange);$(id).addEventListener('change',previewChange)});
$('playBtn').addEventListener('click',playPause);$('resetBtn').addEventListener('click',applyControl);$('eventBtn').addEventListener('click',applyDisturbance);$('langBtn').addEventListener('click',()=>{currentLang=currentLang==='es'?'en':'es';applyLanguage()});
applyControl();applyLanguage();
</script>
</body>
</html>
